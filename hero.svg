<svg viewBox="0 0 900 340" xmlns="http://www.w3.org/2000/svg" style="background:#0f172a;border-radius:16px;overflow:hidden">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="340" fill="url(#bgGrad)"/>
  <rect width="900" height="340" fill="url(#centerGlow)"/>

  <!-- Grid lines -->
  <g stroke="#1e293b" stroke-width="1" opacity="0.5">
    <line x1="0" y1="60" x2="900" y2="60"/>
    <line x1="0" y1="120" x2="900" y2="120"/>
    <line x1="0" y1="180" x2="900" y2="180"/>
    <line x1="0" y1="240" x2="900" y2="240"/>
    <line x1="0" y1="300" x2="900" y2="300"/>
    <line x1="150" y1="0" x2="150" y2="340"/>
    <line x1="300" y1="0" x2="300" y2="340"/>
    <line x1="450" y1="0" x2="450" y2="340"/>
    <line x1="600" y1="0" x2="600" y2="340"/>
    <line x1="750" y1="0" x2="750" y2="340"/>
  </g>

  <!-- Animated dots on grid -->
  <circle cx="300" cy="120" r="3" fill="#2563eb" opacity="0">
    <animate attributeName="opacity" values="0;1;0" dur="3s" begin="0.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="600" cy="180" r="3" fill="#34d399" opacity="0">
    <animate attributeName="opacity" values="0;1;0" dur="3s" begin="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="450" cy="240" r="3" fill="#60a5fa" opacity="0">
    <animate attributeName="opacity" values="0;1;0" dur="3s" begin="2.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Animated pulse circle -->
  <circle cx="450" cy="170" r="120" fill="none" stroke="#2563eb" stroke-width="1" opacity="0.1">
    <animate attributeName="r" values="80;160;80" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.15;0;0.15" dur="6s" repeatCount="indefinite"/>
  </circle>

  <!-- Icon box (glassy) -->
  <rect x="388" y="80" width="64" height="64" rx="18" fill="#1e293b" stroke="#2563eb" stroke-width="1.5" opacity="0.9"/>
  <!-- Hard hat icon simplified -->
  <g transform="translate(420,112)" fill="#60a5fa">
    <ellipse cx="0" cy="0" rx="18" ry="12" fill="#2563eb"/>
    <rect x="-22" y="4" width="44" height="5" rx="2.5" fill="#3b82f6"/>
    <rect x="-8" y="-12" width="16" height="8" rx="2" fill="#60a5fa" opacity="0.6"/>
  </g>

  <!-- Title -->
  <text x="450" y="178" font-family="'Inter',system-ui,sans-serif" font-size="42" font-weight="800" fill="white" text-anchor="middle" letter-spacing="-1">SiteBook</text>

  <!-- Animated underline -->
  <line x1="380" y1="190" x2="520" y2="190" stroke="url(#blueGrad)" stroke-width="3" stroke-linecap="round">
    <animate attributeName="x1" values="450;380;450" dur="3s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1"/>
    <animate attributeName="x2" values="450;520;450" dur="3s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1"/>
  </line>

  <!-- Subtitle -->
  <text x="450" y="215" font-family="'Inter',system-ui,sans-serif" font-size="15" fill="#94a3b8" text-anchor="middle" letter-spacing="0.5">Construction Labour Operating System</text>

  <!-- Tag pills row -->
  <!-- MERN -->
  <rect x="245" y="248" width="68" height="26" rx="13" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="279" y="266" font-family="'Inter',system-ui,sans-serif" font-size="11" fill="#60a5fa" text-anchor="middle" font-weight="600">MERN Stack</text>
  <!-- PWA -->
  <rect x="323" y="248" width="50" height="26" rx="13" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="348" y="266" font-family="'Inter',system-ui,sans-serif" font-size="11" fill="#34d399" text-anchor="middle" font-weight="600">PWA</text>
  <!-- Socket.IO -->
  <rect x="383" y="248" width="70" height="26" rx="13" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="418" y="266" font-family="'Inter',system-ui,sans-serif" font-size="11" fill="#a78bfa" text-anchor="middle" font-weight="600">Socket.IO</text>
  <!-- AI -->
  <rect x="463" y="248" width="62" height="26" rx="13" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="494" y="266" font-family="'Inter',system-ui,sans-serif" font-size="11" fill="#f59e0b" text-anchor="middle" font-weight="600">Claude AI</text>
  <!-- Offline -->
  <rect x="535" y="248" width="72" height="26" rx="13" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="571" y="266" font-family="'Inter',system-ui,sans-serif" font-size="11" fill="#fb7185" text-anchor="middle" font-weight="600">Offline-First</text>

  <!-- Bottom stat row -->
  <g transform="translate(0,298)" opacity="0.7">
    <text x="225" y="0" font-family="'Inter',system-ui,sans-serif" font-size="11" fill="#64748b" text-anchor="middle">React 19</text>
    <text x="315" y="0" font-family="'Inter',system-ui,sans-serif" font-size="11" fill="#64748b" text-anchor="middle">Express 5</text>
    <text x="405" y="0" font-family="'Inter',system-ui,sans-serif" font-size="11" fill="#64748b" text-anchor="middle">MongoDB</text>
    <text x="495" y="0" font-family="'Inter',system-ui,sans-serif" font-size="11" fill="#64748b" text-anchor="middle">Tailwind v4</text>
    <text x="590" y="0" font-family="'Inter',system-ui,sans-serif" font-size="11" fill="#64748b" text-anchor="middle">Vite 6</text>
    <text x="680" y="0" font-family="'Inter',system-ui,sans-serif" font-size="11" fill="#64748b" text-anchor="middle">Zustand 5</text>
  </g>

  <!-- Animated scan line -->
  <rect x="0" y="0" width="900" height="2" fill="url(#blueGrad)" opacity="0.4">
    <animate attributeName="y" values="-2;342;-2" dur="4s" repeatCount="indefinite" calcMode="linear"/>
    <animate attributeName="opacity" values="0;0.4;0" dur="4s" repeatCount="indefinite"/>
  </rect>
</svg>
