<svg viewBox="0 0 900 300" xmlns="http://www.w3.org/2000/svg" style="background:#0a0f1e;border-radius:16px;overflow:hidden">
  <defs>
    <linearGradient id="offBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0f1e"/>
      <stop offset="100%" stop-color="#0a1a14"/>
    </linearGradient>
  </defs>
  <rect width="900" height="300" fill="url(#offBg)"/>

  <text x="450" y="34" font-family="'Inter',system-ui,sans-serif" font-size="15" font-weight="700" fill="#94a3b8" text-anchor="middle" letter-spacing="3">OFFLINE-FIRST  ·  PWA ARCHITECTURE</text>
  <text x="450" y="52" font-family="'Inter',system-ui,sans-serif" font-size="11" fill="#475569" text-anchor="middle">Works without internet — syncs when back online</text>

  <!-- Step flow: Device → IndexedDB → Service Worker → API -->

  <!-- Phone -->
  <rect x="40" y="70" width="140" height="180" rx="14" fill="#0d1b2e" stroke="#1e3a8a" stroke-width="1.5"/>
  <text x="110" y="104" font-family="'Inter',system-ui,sans-serif" font-size="28" text-anchor="middle">📱</text>
  <text x="110" y="128" font-family="'Inter',system-ui,sans-serif" font-size="12" font-weight="700" fill="#60a5fa" text-anchor="middle">Supervisor App</text>
  <text x="110" y="146" font-family="'Inter',system-ui,sans-serif" font-size="10" fill="#64748b" text-anchor="middle">Marks attendance</text>
  <text x="110" y="160" font-family="'Inter',system-y,sans-serif" font-size="10" fill="#64748b" text-anchor="middle">on-site field</text>
  <!-- wifi off indicator -->
  <rect x="68" y="176" width="84" height="24" rx="10" fill="#7f1d1d" stroke="#ef4444" stroke-width="0.5"/>
  <text x="110" y="192" font-family="'Inter',system-ui,sans-serif" font-size="10" fill="#fca5a5" text-anchor="middle">📵 No Internet</text>
  <text x="110" y="238" font-family="'Inter',system-ui,sans-serif" font-size="9" fill="#475569" text-anchor="middle">React + Zustand</text>

  <!-- Arrow 1 -->
  <line x1="180" y1="160" x2="220" y2="160" stroke="#65a30d" stroke-width="2" marker-end="url(#arrowLG)" stroke-dasharray="4,2">
    <animate attributeName="stroke-dashoffset" values="0;-12" dur="0.7s" repeatCount="indefinite"/>
  </line>
  <defs>
    <marker id="arrowLG" markerWidth="8" markerHeight="6" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#65a30d"/>
    </marker>
    <marker id="arrowLC" markerWidth="8" markerHeight="6" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#06b6d4"/>
    </marker>
    <marker id="arrowLB" markerWidth="8" markerHeight="6" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3b82f6"/>
    </marker>
  </defs>
  <text x="200" y="150" font-family="'Inter',system-ui,sans-serif" font-size="8" fill="#65a30d" text-anchor="middle">saves</text>

  <!-- IndexedDB -->
  <rect x="220" y="70" width="150" height="180" rx="14" fill="#0a1f10" stroke="#166534" stroke-width="1.5"/>
  <text x="295" y="104" font-family="'Inter',system-ui,sans-serif" font-size="28" text-anchor="middle">🗄️</text>
  <text x="295" y="128" font-family="'Inter',system-ui,sans-serif" font-size="12" font-weight="700" fill="#4ade80" text-anchor="middle">IndexedDB</text>
  <text x="295" y="146" font-family="'Inter',system-ui,sans-serif" font-size="10" fill="#64748b" text-anchor="middle">SiteBookOffline</text>
  <!-- stores -->
  <rect x="240" y="158" width="110" height="18" rx="6" fill="#166534" opacity="0.7"/>
  <text x="295" y="171" font-family="'Inter',system-ui,sans-serif" font-size="9" fill="#6ee7b7" text-anchor="middle">attendance store</text>
  <rect x="240" y="182" width="110" height="18" rx="6" fill="#166534" opacity="0.5"/>
  <text x="295" y="195" font-family="'Inter',system-ui,sans-serif" font-size="9" fill="#6ee7b7" text-anchor="middle">materials store</text>
  <text x="295" y="230" font-family="'Inter',system-ui,sans-serif" font-size="9" fill="#475569" text-anchor="middle">offlineId keyed</text>

  <!-- Arrow 2 - online restore -->
  <line x1="370" y1="140" x2="406" y2="140" stroke="#06b6d4" stroke-width="2" marker-end="url(#arrowLC)" stroke-dasharray="4,2">
    <animate attributeName="stroke-dashoffset" values="0;-12" dur="0.7s" repeatCount="indefinite"/>
  </line>
  <text x="388" y="130" font-family="'Inter',system-ui,sans-serif" font-size="8" fill="#06b6d4" text-anchor="middle">back</text>
  <text x="388" y="152" font-family="'Inter',system-ui,sans-serif" font-size="8" fill="#06b6d4" text-anchor="middle">online</text>

  <!-- Service Worker / Sync -->
  <rect x="406" y="70" width="160" height="180" rx="14" fill="#0f1f2e" stroke="#0284c7" stroke-width="1.5"/>
  <text x="486" y="104" font-family="'Inter',system-ui,sans-serif" font-size="28" text-anchor="middle">⚙️</text>
  <text x="486" y="128" font-family="'Inter',system-ui,sans-serif" font-size="12" font-weight="700" fill="#38bdf8" text-anchor="middle">Sync Engine</text>
  <text x="486" y="146" font-family="'Inter',system-ui,sans-serif" font-size="10" fill="#64748b" text-anchor="middle">useOnlineStatus hook</text>
  <text x="486" y="160" font-family="'Inter',system-ui,sans-serif" font-size="10" fill="#64748b" text-anchor="middle">syncPendingRecords()</text>
  <text x="486" y="174" font-family="'Inter',system-ui,sans-serif" font-size="10" fill="#64748b" text-anchor="middle">Conflict resolution</text>
  <text x="486" y="188" font-family="'Inter',system-ui,sans-serif" font-size="10" fill="#64748b" text-anchor="middle">offlineId dedup</text>
  <rect x="428" y="204" width="116" height="20" rx="8" fill="#0284c7" opacity="0.2" stroke="#0284c7" stroke-width="0.5"/>
  <text x="486" y="218" font-family="'Inter',system-ui,sans-serif" font-size="9" fill="#38bdf8" text-anchor="middle">Vite PWA Workbox</text>

  <!-- Arrow 3 -->
  <line x1="566" y1="160" x2="600" y2="160" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowLB)" stroke-dasharray="4,2">
    <animate attributeName="stroke-dashoffset" values="0;-12" dur="0.7s" repeatCount="indefinite"/>
  </line>
  <text x="583" y="150" font-family="'Inter',system-ui,sans-serif" font-size="8" fill="#3b82f6" text-anchor="middle">POST</text>
  <text x="583" y="170" font-family="'Inter',system-ui,sans-serif" font-size="8" fill="#3b82f6" text-anchor="middle">/api/att</text>

  <!-- Server -->
  <rect x="600" y="70" width="140" height="180" rx="14" fill="#0d1b2e" stroke="#065f46" stroke-width="1.5"/>
  <text x="670" y="104" font-family="'Inter',system-ui,sans-serif" font-size="28" text-anchor="middle">🖥️</text>
  <text x="670" y="128" font-family="'Inter',system-ui,sans-serif" font-size="12" font-weight="700" fill="#34d399" text-anchor="middle">Express API</text>
  <text x="670" y="146" font-family="'Inter',system-ui,sans-serif" font-size="10" fill="#64748b" text-anchor="middle">Bulk POST endpoint</text>
  <text x="670" y="160" font-family="'Inter',system-ui,sans-serif" font-size="10" fill="#64748b" text-anchor="middle">syncedFromOffline:true</text>
  <text x="670" y="174" font-family="'Inter',system-ui,sans-serif" font-size="10" fill="#64748b" text-anchor="middle">offlineId upsert</text>
  <!-- online badge -->
  <rect x="622" y="188" width="96" height="20" rx="8" fill="#065f46" opacity="0.7"/>
  <circle cx="636" cy="198" r="4" fill="#34d399">
    <animate attributeName="opacity" values="1;0.3;1" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <text x="672" y="202" font-family="'Inter',system-ui,sans-serif" font-size="9" fill="#6ee7b7" text-anchor="middle">Real-time push</text>

  <!-- Socket notify -->
  <line x1="740" y1="120" x2="800" y2="120" stroke="#f472b6" stroke-width="1.5" stroke-dasharray="3,2" opacity="0.6">
    <animate attributeName="stroke-dashoffset" values="0;-10" dur="0.6s" repeatCount="indefinite"/>
  </line>
  <rect x="800" y="80" width="80" height="80" rx="12" fill="#1a0f20" stroke="#db2777" stroke-width="1"/>
  <text x="840" y="114" font-family="'Inter',system-ui,sans-serif" font-size="20" text-anchor="middle">⚡</text>
  <text x="840" y="132" font-family="'Inter',system-ui,sans-serif" font-size="9" font-weight="700" fill="#f472b6" text-anchor="middle">Socket</text>
  <text x="840" y="146" font-family="'Inter',system-ui,sans-serif" font-size="9" fill="#64748b" text-anchor="middle">Notify all</text>

  <!-- Pending count badge animation -->
  <rect x="244" y="74" width="50" height="18" rx="9" fill="#ef4444">
    <animate attributeName="opacity" values="1;0.5;1" dur="2s" repeatCount="indefinite"/>
  </rect>
  <text x="269" y="87" font-family="'Inter',system-ui,sans-serif" font-size="9" fill="white" text-anchor="middle" font-weight="700">32 pending</text>
</svg>
