<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg" style="background:#0a0f1e;border-radius:16px;overflow:hidden">
  <defs>
    <linearGradient id="archBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0f1e"/>
      <stop offset="100%" stop-color="#0f1729"/>
    </linearGradient>
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3b82f6"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#34d399"/>
    </marker>
    <marker id="arrowPurple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#a78bfa"/>
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#fb923c"/>
    </marker>
  </defs>

  <rect width="900" height="500" fill="url(#archBg)"/>

  <!-- Title -->
  <text x="450" y="32" font-family="'Inter',system-ui,sans-serif" font-size="15" font-weight="700" fill="#94a3b8" text-anchor="middle" letter-spacing="3">SYSTEM ARCHITECTURE</text>

  <!-- ═══════════ CLIENT LAYER ═══════════ -->
  <rect x="20" y="50" width="860" height="130" rx="14" fill="#0d1b2e" stroke="#1e3a8a" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="36" y="70" font-family="'Inter',system-ui,sans-serif" font-size="11" fill="#60a5fa" font-weight="600" letter-spacing="1">CLIENT  ·  React 19  +  Vite 6  +  PWA</text>

  <!-- React/UI box -->
  <rect x="40" y="82" width="120" height="82" rx="10" fill="#1e3a8a" stroke="#3b82f6" stroke-width="1"/>
