  <text x="240" y="126" font-family="'Inter',system-ui,sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Zustand 5</text>
  <text x="240" y="140" font-family="'Inter',system-ui,sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">TanStack Query</text>
  <text x="240" y="153" font-family="'Inter',system-ui,sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Auth / Theme / Offline</text>

