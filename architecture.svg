  <text x="730" y="272" font-family="'Inter',system-ui,sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">site:{id} rooms</text>
  <text x="730" y="285" font-family="'Inter',system-ui,sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">contractor:{id} rooms</text>
