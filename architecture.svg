  <text x="265" y="440" font-family="'Inter',system-ui,sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Photo Upload</text>
  <text x="265" y="454" font-family="'Inter',system-ui,sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Attendance Proof</text>

