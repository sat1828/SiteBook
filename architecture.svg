  <text x="110" y="440" font-family="'Inter',system-ui,sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Mongoose ODM</text>
  <text x="110" y="454" font-family="'Inter',system-ui,sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">GeoJSON · Indexes · Agg</text>

