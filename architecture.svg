  <text x="730" y="311" font-family="'Inter',system-ui,sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Multi-tenant isolation</text>
  <text x="730" y="324" font-family="'Inter',system-ui,sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Ping/reconnect</text>

