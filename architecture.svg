  <rect x="650" y="398" width="110" height="70" rx="10" fill="#1a0a0a" stroke="#dc2626" stroke-width="1"/>
  <text x="705" y="424" font-family="'Inter',system-ui,sans-serif" font-size="12" font-weight="700" fill="#fca5a5" text-anchor="middle">PDFKit</text>
  <text x="705" y="440" font-family="'Inter',system-ui,sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">BOCW Muster Roll</text>
  <text x="705" y="454" font-family="'Inter',system-ui,sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Wage Slips · ECR</text>

  <!-- GPS/Browser -->
