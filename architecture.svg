  <text x="825" y="424" font-family="'Inter',system-ui,sans-serif" font-size="11" font-weight="700" fill="#4ade80" text-anchor="middle">Geo API</text>
  <text x="825" y="440" font-family="'Inter',system-ui,sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">GPS Validation</text>
  <text x="825" y="454" font-family="'Inter',system-ui,sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">200m Radius</text>

  <!-- Animated connecting arrows -->
  <!-- Client → Server (HTTP) -->
  <line x1="450" y1="180" x2="450" y2="204" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowBlue)" stroke-dasharray="4,2">
    <animate attributeName="stroke-dashoffset" values="0;-12" dur="1s" repeatCount="indefinite"/>
  </line>
  <text x="460" y="196" font-family="'Inter',system-ui,sans-serif" font-size="8" fill="#3b82f6">REST API</text>

  <!-- Server → DB -->
  <line x1="200" y1="344" x2="140" y2="398" stroke="#4ade80" stroke-width="1.5" marker-end="url(#arrowGreen)" stroke-dasharray="4,2">
    <animate attributeName="stroke-dashoffset" values="0;-12" dur="0.8s" repeatCount="indefinite"/>
  </line>

  <!-- Socket bidirectional -->
  <line x1="520" y1="180" x2="730" y2="234" stroke="#f472b6" stroke-width="1.5" stroke-dasharray="3,2" opacity="0.7">
    <animate attributeName="stroke-dashoffset" values="0;-10" dur="0.6s" repeatCount="indefinite"/>
  </line>
</svg>
