  <rect x="350" y="398" width="130" height="70" rx="10" fill="#1a0a20" stroke="#9333ea" stroke-width="1"/>
  <text x="415" y="424" font-family="'Inter',system-ui,sans-serif" font-size="12" font-weight="700" fill="#c084fc" text-anchor="middle">Twilio</text>
  <text x="415" y="440" font-family="'Inter',system-ui,sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">WhatsApp Payslips</text>
  <text x="415" y="454" font-family="'Inter',system-ui,sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Signed Token Links</text>

  <!-- Claude AI -->
  <rect x="500" y="398" width="130" height="70" rx="10" fill="#1c1209" stroke="#d97706" stroke-width="1"/>
  <text x="565" y="424" font-family="'Inter',system-ui,sans-serif" font-size="12" font-weight="700" fill="#fbbf24" text-anchor="middle">Anthropic Claude</text>
  <text x="565" y="440" font-family="'Inter',system-ui,sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Dispute Resolution</text>
  <text x="565" y="454" font-family="'Inter',system-ui,sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Anomaly · Forecast</text>

