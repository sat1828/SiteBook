  <text x="380" y="126" font-family="'Inter',system-ui,sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">IndexedDB (idb)</text>
  <text x="380" y="140" font-family="'Inter',system-ui,sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Service Worker</text>
  <text x="380" y="153" font-family="'Inter',system-ui,sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Background Sync</text>

